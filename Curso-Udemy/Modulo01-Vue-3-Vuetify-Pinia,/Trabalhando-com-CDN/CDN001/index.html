<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assets/styles.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <title>CDN</title>
</head>
<body>
  
  <div id="app">
   <h1>  {{ message }} </h1>
   <!-- O v-model cria uma ligação de dados bidirecional entre um elemento do formulário (ou componente) e uma variável do seu script. Exemplo: >>

   quando a variável muda → o campo atualiza
   quando o usuário digita → a variável atualiza 
   -->
  <input v-bind:type="texto" v-model="message">
  </div>
  <!--A diretiva v-bind:atributo  podemos abreviar para :atributo e ele é uma diretiva para tornar qualquer atributo dinamico aperte f12 para verificar a sua execução.-->
  <script>
    const { createApp, ref } = Vue

    createApp({
      setup() {
        const message = ref('Hello vue!')
        return {
          message,
          texto: "Não temos mensagem hoje."
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
